services:
  personal-assistant:
    image: personal-assistant:${IMAGE_TAG:-latest}
    container_name: personal-assistant
    restart: always
    ports:
      - "6002:8000"
    volumes:
      - /var/lib/jenkins/personal-assistant/credentials.json:/app/credentials.json:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      TZ: Asia/Seoul
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET}
      SLACK_MY_USER_ID: ${SLACK_MY_USER_ID}
      OLLAMA_HOST: ${OLLAMA_HOST}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma4:12b}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      DATABASE_URL: ${DATABASE_URL}
      CHROMA_HOST: ${CHROMA_HOST:-host.docker.internal}
      CHROMA_PORT: ${CHROMA_PORT:-8001}
      GOOGLE_CREDENTIALS_PATH: /app/credentials.json
      EXPENSE_SHEET_ID: ${EXPENSE_SHEET_ID}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
