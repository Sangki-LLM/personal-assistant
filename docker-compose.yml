services:
  personal-assistant:
    image: personal-assistant:${IMAGE_TAG:-latest}
    container_name: personal-assistant
    restart: always
    ports:
      - "6002:8000"
    volumes:
      - /var/lib/jenkins/personal-assistant/credentials.json:/app/credentials.json:ro
      - /var/lib/jenkins/personal-assistant/user_files:/app/user_files
      - /var/lib/jenkins/personal-assistant/graph_store:/app/graph_store
      - /var/lib/jenkins/personal-assistant/templates:/app/app/templates
    environment:
      TZ: Asia/Seoul
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET}
      SLACK_MY_USER_ID: ${SLACK_MY_USER_ID}
      OLLAMA_HOST: ${OLLAMA_HOST}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma4:12b}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      DATABASE_URL: ${DATABASE_URL}
      CHROMA_HOST: ${CHROMA_HOST:-chromadb}
      CHROMA_PORT: ${CHROMA_PORT:-8000}
      GOOGLE_CREDENTIALS_PATH: /app/credentials.json
      GOOGLE_CALENDAR_ID: ${GOOGLE_CALENDAR_ID:-primary}
      EXPENSE_SHEET_ID: ${EXPENSE_SHEET_ID}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      NEWS_URLS: ${NEWS_URLS}
    networks:
      - default
      - log-agent-net

networks:
  log-agent-net:
    name: log-agent_default
    external: true
